name: Mod CI/CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to CurseForge + GitHub"
        required: false
        default: "false"

concurrency:
  group: mod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      jar: ${{ steps.jar.outputs.path }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: chmod +x gradlew
      - run: ./gradlew clean build

      - name: Get JAR
        id: jar
        run: |
          JAR=$(find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*sources*" | head -n 1)
          echo "path=$JAR" >> $GITHUB_OUTPUT

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: hellmarked-jar
          path: ${{ steps.jar.outputs.path }}

  publish-github:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hellmarked-jar

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.jar"

  publish-curseforge:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hellmarked-jar

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1584085
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: "**/*.jar"

          loaders: |
            neoforge

          game-versions: |
            1.21.1

          version: ${{ github.event_name == 'release' && github.event.release.tag_name }}
          version-type: release

          changelog: ${{ github.event_name == 'release' && github.event.release.body || 'Manual build from workflow_dispatch' }}